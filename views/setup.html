<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <title>Configuración Inicial - Crear Primer Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { -webkit-text-size-adjust: 100%; padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }
        .input-touch { min-height: 48px; font-size: 16px; padding: 0.75rem 1rem; }
        .btn-touch { min-height: 48px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div x-data="setupApp()" x-cloak class="w-full max-w-md px-4">
        <div class="bg-white rounded-lg shadow-lg p-4 sm:p-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2 text-center">🔐 Configuración Inicial</h1>
            <p class="text-gray-600 text-center mb-6 sm:mb-8 text-sm sm:text-base">Crea el primer usuario para acceder al dashboard</p>

            <form @submit.prevent="createUser()" class="space-y-6">
                <!-- Nombre -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                        Nombre completo
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        x-model="form.name"
                        required
                        class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Tu nombre"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        x-model="form.email"
                        required
                        class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="tu@email.com"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        x-model="form.password"
                        required
                        minlength="6"
                        class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Mínimo 6 caracteres"
                    >
                    <p class="text-xs text-gray-500 mt-1">Mínimo 6 caracteres</p>
                </div>

                <!-- Success Message -->
                <div x-show="success" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
                    <p x-text="success"></p>
                    <p class="mt-2 text-sm">
                        <a href="/dashboard" class="font-semibold underline">Ir al dashboard →</a>
                    </p>
                </div>

                <!-- Error Message -->
                <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p x-text="error"></p>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    :disabled="submitting"
                    class="w-full btn-touch bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition"
                >
                    <span x-show="!submitting">Crear usuario</span>
                    <span x-show="submitting">Creando usuario...</span>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                <p>¿Ya tienes un usuario? <a href="/login" class="text-blue-600 hover:underline">Iniciar sesión</a></p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        function setupApp() {
            return {
                form: {
                    name: '',
                    email: '',
                    password: ''
                },
                submitting: false,
                error: '',
                success: '',

                async createUser() {
                    this.submitting = true;
                    this.error = '';
                    this.success = '';

                    try {
                        const response = await fetch('/api/setup/first-user', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.form),
                            credentials: 'same-origin'
                        });

                        const data = await response.json().catch(() => ({ error: 'El servidor no respondió correctamente' }));

                        if (!response.ok) {
                            this.error = data.error || 'Error ' + response.status;
                        } else if (data.error) {
                            this.error = data.error;
                        } else {
                            this.success = data.message || 'Usuario creado. Redirigiendo al login...';
                            setTimeout(() => {
                                window.location.replace('/login');
                            }, 2000);
                        }
                    } catch (error) {
                        console.error('Error creando usuario:', error);
                        this.error = 'Error de conexión. Comprueba la URL y vuelve a intentarlo.';
                    } finally {
                        this.submitting = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
