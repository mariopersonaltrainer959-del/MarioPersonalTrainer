<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <title>Iniciar sesión - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { -webkit-text-size-adjust: 100%; padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }
        .input-touch { min-height: 48px; font-size: 16px; padding: 0.75rem 1rem; }
        .btn-touch { min-height: 48px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div x-data="loginApp()" x-cloak class="w-full max-w-md px-4">
        <div class="bg-white rounded-lg shadow-lg p-4 sm:p-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2 text-center">Dashboard</h1>
            <p class="text-gray-600 text-center mb-6 sm:mb-8 text-sm sm:text-base">Inicia sesión para gestionar tus entrenos</p>

            <form @submit.prevent="login()" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        x-model="form.email"
                        required
                        class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="tu@email.com"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        x-model="form.password"
                        required
                        class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Tu contraseña"
                    >
                </div>

                <!-- Error Message -->
                <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p x-text="error"></p>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    :disabled="submitting"
                    class="w-full btn-touch bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition"
                >
                    <span x-show="!submitting">Iniciar sesión</span>
                    <span x-show="submitting">Iniciando sesión...</span>
                </button>

                <p class="text-center text-sm text-gray-500 mt-4">
                    <a href="/reset-password" class="text-blue-600 hover:underline">¿Olvidaste tu contraseña? Restablecer</a>
                </p>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        function loginApp() {
            return {
                form: {
                    email: '',
                    password: ''
                },
                submitting: false,
                error: '',

                async login() {
                    this.submitting = true;
                    this.error = '';

                    try {
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(this.form),
                            credentials: 'same-origin'
                        });

                        const data = await response.json().catch(() => ({ error: 'Respuesta inválida del servidor' }));

                        if (data.error) {
                            this.error = data.error;
                        } else {
                            window.location.replace('/dashboard');
                        }
                    } catch (error) {
                        console.error('Error en login:', error);
                        this.error = 'Error al iniciar sesión. Por favor, intenta de nuevo.';
                    } finally {
                        this.submitting = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
