<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Restablecer contraseña</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-text-size-adjust: 100%; padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }
    .input-touch { min-height: 48px; font-size: 16px; padding: 0.75rem 1rem; }
    .btn-touch { min-height: 48px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-4 sm:p-8 mx-4">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 mb-4 sm:mb-6">Restablecer contraseña</h1>
    <p class="text-gray-600 text-sm mb-6">Solo funciona si en Railway tienes configurada la variable <code class="bg-gray-200 px-1 rounded">RESET_PASSWORD_SECRET</code>. Introduce aquí el mismo valor y tu email.</p>
    <form id="form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email del usuario</label>
        <input type="email" id="email" required placeholder="tu@email.com"
          class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña (mín. 6 caracteres)</label>
        <input type="password" id="newPassword" required minlength="6" placeholder="••••••••"
          class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Clave secreta (RESET_PASSWORD_SECRET)</label>
        <input type="password" id="secret" required placeholder="La que pusiste en Railway"
          class="w-full input-touch border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div id="message" class="hidden text-sm rounded-lg p-3"></div>
      <button type="submit" class="w-full btn-touch bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700">
        Restablecer contraseña
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      <a href="/login" class="text-blue-600 hover:underline">Volver al login</a>
    </p>
  </div>
  <script>
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
      msg.textContent = 'Enviando...';
      try {
        const r = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            newPassword: document.getElementById('newPassword').value,
            secret: document.getElementById('secret').value
          })
        });
        const data = await r.json();
        if (data.error) {
          msg.classList.add('bg-red-100', 'text-red-700');
          msg.textContent = data.error;
        } else {
          msg.classList.add('bg-green-100', 'text-green-700');
          msg.textContent = data.message || 'Listo. Ya puedes iniciar sesión.';
        }
      } catch (err) {
        msg.classList.add('bg-red-100', 'text-red-700');
        msg.textContent = 'Error de conexión.';
      }
    };
  </script>
</body>
</html>
